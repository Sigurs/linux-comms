<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Linux Comms</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <aside id="sidebar">
        <nav id="profile-list"></nav>
        <div id="sidebar-footer">
          <button id="btn-add-profile" class="icon-btn" title="Add profile">+</button>
          <span id="app-version"></span>
        </div>
      </aside>

      <main id="content">
        <div id="webview-container"></div>
        <div id="empty-state">
          <p>Add a profile to get started.</p>
          <button id="btn-add-profile-empty">Add profile</button>
        </div>
      </main>
    </div>

    <!-- Add profile modal -->
    <div id="modal-overlay" class="hidden">
      <div id="modal" role="dialog" aria-modal="true">
        <h2 id="modal-title">Add Profile</h2>
        <form id="add-profile-form">
          <label>
            Provider
            <select id="provider-select"></select>
          </label>
          <label>
            Profile Name
            <input id="profile-name" type="text" placeholder="e.g. Work" required />
          </label>
          <div id="provider-extra-fields"></div>
          <div class="modal-actions">
            <button type="button" id="btn-modal-cancel">Cancel</button>
            <button type="submit">Add</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Rename profile modal -->
    <div id="rename-overlay" class="hidden">
      <div id="rename-modal" role="dialog" aria-modal="true">
        <h2>Rename Profile</h2>
        <form id="rename-form">
          <label>
            Name
            <input id="rename-input" type="text" required />
          </label>
          <div class="modal-actions">
            <button type="button" id="btn-rename-cancel">Cancel</button>
            <button type="submit">Rename</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Icon picker modal -->
    <div id="icon-picker-overlay" class="hidden">
      <div id="icon-picker" role="dialog" aria-modal="true" aria-labelledby="icon-picker-title">
        <h2 id="icon-picker-title">Choose Icon</h2>

        <!-- Section 1: Company / server logo (hidden when unavailable) -->
        <div id="icon-picker-company" class="hidden">
          <p class="icon-picker-section-label">Company Logo</p>
          <div id="icon-picker-company-grid" class="icon-picker-grid"></div>
        </div>

        <!-- Section 2: Icon library -->
        <div id="icon-picker-library">
          <p class="icon-picker-section-label">Icon Library</p>
          <input
            id="icon-picker-search"
            type="search"
            placeholder="Search icons…"
            autocomplete="off"
            spellcheck="false"
          />
          <div id="icon-picker-grid" class="icon-picker-grid"></div>
          <p id="icon-picker-empty" class="hidden">No icons found.</p>
        </div>

        <!-- Section 3: Custom URL -->
        <div id="icon-picker-custom">
          <p class="icon-picker-section-label">Custom URL</p>
          <input
            id="icon-picker-custom-url"
            type="url"
            placeholder="https://example.com/icon.png"
            autocomplete="off"
            spellcheck="false"
          />
          <div id="icon-picker-custom-preview-wrap" class="hidden">
            <img id="icon-picker-custom-preview" alt="" />
          </div>
        </div>

        <div class="modal-actions">
          <button type="button" id="btn-icon-picker-cancel">Cancel</button>
          <button type="button" id="btn-icon-picker-confirm">Confirm</button>
        </div>
      </div>
    </div>

    <!-- Portal warning banner -->
    <div id="portal-warning" class="hidden">
      ⚠ Screen sharing requires xdg-desktop-portal which was not detected on this system.
      <button id="btn-dismiss-warning">✕</button>
    </div>

    <script src="bundle.js"></script>
  </body>
</html>
